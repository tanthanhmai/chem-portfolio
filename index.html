<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CADD Portfolio</title>
    <style>
        :root { --primary: #1e293b; --accent: #0ea5e9; --bg: #f8fafc; --text: #334155; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); }
        
        /* Layout */
        #sidebar { width: 260px; background: var(--primary); color: white; padding: 25px 20px; }
        .menu-item { padding: 12px; border-radius: 8px; margin-top: 10px; cursor: pointer; color: #94a3b8; }
        .menu-item.active { background: rgba(255,255,255,0.1); color: white; border-left: 4px solid var(--accent); }
        
        #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 20px 30px; background: white; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
        
        /* Table Styling */
        #table-area { flex: 1; overflow-y: auto; padding: 0 30px 20px 30px; background: white; }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 16px 12px; text-align: left; background: white; color: #64748b; font-size: 14px; border-bottom: 2px solid #e2e8f0; cursor: pointer; }
        th.col-struct { min-width: 180px; } /* Làm cột Structure to ra */
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
        .thumb-img { width: 150px; height: 100px; object-fit: contain; mix-blend-mode: multiply; }
        
        /* Viewer - Phải */
        #viewer { width: 420px; background: #f8fafc; padding: 30px; border-left: 1px solid #e2e8f0; overflow-y: auto; }
        .mol-card { background: white; padding: 25px; border-radius: 12px; border: 1px solid #e2e8f0; text-align: center; }
        .hit-label { color: #64748b; font-size: 14px; margin-bottom: 5px; }
        .hit-id { color: var(--primary); font-size: 24px; font-weight: 700; margin-top: 0; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="font-size: 1.1rem; color: #94a3b8; margin-top:0;">Campaigns</h2>
    <div id="menu-container"></div>
</div>

<div id="main">
    <div class="header">
        <h2 style="margin:0; font-size: 20px; color: var(--primary);">Hit list</h2>
        <div class="header-actions">
            <input type="text" id="search-input" style="padding:8px 15px; border:1px solid #cbd5e1; border-radius:6px;" placeholder="Search..." onkeyup="filterTable()">
        </div>
    </div>
    <div id="table-area">
        <table id="hits-table">
            <thead><tr id="table-head-row"></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<div id="viewer">
    <div class="mol-card">
        <div class="hit-label">Hit compound</div>
        <h3 id="mol-id" class="hit-id">Select a Hit</h3>
        <img id="mol-image" style="width:100%; max-width:350px; margin:20px 0; display:none;" src="">
        <div id="mol-details" style="text-align: left; font-size: 14px; color: #475569;"></div>
    </div>
</div>

<script>
    // ... (Giữ nguyên các hàm fetch, sortTable, filterTable như cũ) ...
    // Cập nhật phần renderHeaders để thêm class col-struct
    function renderHeaders() {
        const row = document.getElementById('table-head-row');
        row.innerHTML = '<th>ID</th><th class="col-struct">Structure</th>';
        currentHeaders.forEach(h => {
            const th = document.createElement('th');
            th.innerText = h;
            th.onclick = () => sortTable(h);
            row.appendChild(th);
        });
    }

    // Cập nhật renderMolecule để hiển thị nhãn mới
    function renderMolecule(hit, tr) {
        document.querySelectorAll('tr').forEach(r => r.classList.remove('active-row'));
        tr.classList.add('active-row');
        document.getElementById('mol-id').innerText = hit.id || hit.ID || 'N/A';
        // ... giữ nguyên phần render ảnh và details
    }
    
    // Lưu ý: Đảm bảo bạn đã dán lại phần script đầy đủ từ các bước trước vào đây
</script>
</body>
</html>
