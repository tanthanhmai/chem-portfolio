<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Medicinal Chemistry Portfolio</title>
    <script src="https://unpkg.com/@rdkit/rdkit@1.1.0/dist/RDKit_minimal.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; height: 100vh; margin: 0; background: #f0f2f5; }
        #sidebar { width: 250px; background: #1c2b36; color: white; padding: 20px; }
        #main { flex: 1; display: flex; flex-direction: column; background: white; }
        #table-container { flex: 1; overflow-y: auto; padding: 20px; }
        #viewer { width: 400px; background: #fafafa; border-left: 1px solid #ddd; padding: 20px; text-align: center; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border-bottom: 1px solid #eee; padding: 10px; text-align: left; cursor: pointer; }
        canvas { border: 1px solid #ddd; background: white; margin-top: 20px; max-width: 100%; }
        .status-msg { position: fixed; top: 0; left: 0; right: 0; padding: 10px; text-align: center; background: #ffeb3b; z-index: 999; }
    </style>
</head>
<body>

<div id="status" class="status-msg">Initializing RDKit Engine... (If this stays, check Internet connection)</div>

<div id="sidebar">
    <h2>Projects</h2>
    <div onclick="location.reload()" style="cursor:pointer; padding:10px; background:#34495e; border-radius:4px;">🔄 Refresh Hub</div>
</div>

<div id="main">
    <div style="padding:20px; border-bottom:1px solid #ddd;">
        <h1 style="margin:0">Virtual Screening Hits</h1>
    </div>
    <div id="table-container">
        <table>
            <thead>
                <tr>
                    <th>Compound ID</th>
                    <th>Affinity</th>
                    <th>MW</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
</div>

<div id="viewer">
    <h3 id="mol-name">Select a molecule</h3>
    <canvas id="canvas" width="300" height="300"></canvas>
    <div id="details" style="margin-top:20px; text-align:left;"></div>
</div>

<script>
    // Dữ liệu 50 Hits mẫu (Hard-coded để test hiển thị)
    const myHits = [];
    for(let i=1; i<=50; i++) {
        myHits.push({
            id: "HIT_" + i,
            smiles: i % 2 === 0 ? "c1ccccc1" : "CN1C=NC2=C1C(=O)N(C(=O)N2C)C",
            energy: (-8.0 - (i * 0.05)).toFixed(2)
        });
    }

    // Khởi tạo RDKit với cơ chế bắt lỗi (Error Handling)
    window.initRDKitModule().then(function(instance) {
        console.log("RDKit Lib Loaded Successfully");
        const RDKit = instance;
        document.getElementById('status').style.display = 'none'; // Tắt thông báo loading
        
        renderTable(RDKit);
    }).catch(function(err) {
        console.error("RDKit Failed:", err);
        document.getElementById('status').innerHTML = "❌ Error: Cannot load RDKit. Try using Chrome or Edge.";
        document.getElementById('status').style.background = "#f44336";
        document.getElementById('status').style.color = "white";
    });

    function renderTable(RDKit) {
        const tbody = document.getElementById('tbody');
        myHits.forEach(hit => {
            const mol = RDKit.get_mol(hit.smiles);
            const mw = JSON.parse(mol.get_descriptors()).amw.toFixed(1);
            
            const tr = document.createElement('tr');
            tr.innerHTML = `<td><b>${hit.id}</b></td><td>${hit.energy}</td><td>${mw}</td>`;
            tr.onclick = () => draw(RDKit, hit, mw);
            tbody.appendChild(tr);
            mol.delete();
        });
        // Tự động vẽ cái đầu tiên
        draw(RDKit, myHits[0], "92.1");
    }

    function draw(RDKit, hit, mw) {
        document.getElementById('mol-name').innerText = hit.id;
        const canvas = document.getElementById('canvas');
        const mol = RDKit.get_mol(hit.smiles);
        mol.draw_to_canvas(canvas, 300, 300);
        mol.delete();
        
        document.getElementById('details').innerHTML = `
            <p><b>SMILES:</b> ${hit.smiles}</p>
            <p><b>Affinity:</b> ${hit.energy} kcal/mol</p>
            <p><b>Mol Weight:</b> ${mw}</p>
        `;
    }
</script>

</body>
</html>
