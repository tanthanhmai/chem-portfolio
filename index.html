<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cheminformatics Hits Hub</title>
    <script src="https://unpkg.com/@rdkit/rdkit/dist/RDKit_minimal.js"></script>
    <style>
        :root { --sidebar: #1e293b; --accent: #3b82f6; --bg: #f8f9fa; }
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); }
        .sidebar { width: 250px; background: var(--sidebar); color: white; padding: 20px; display: flex; flex-direction: column; }
        .main { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; background: white; }
        .header { padding: 20px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .container { display: flex; flex-grow: 1; overflow: hidden; }
        .table-wrap { flex: 1; overflow-y: auto; padding: 20px; border-right: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #f1f5f9; padding: 12px; text-align: left; cursor: pointer; position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
        tr:hover { background: #f0f7ff; }
        .viewer { width: 400px; padding: 20px; display: flex; flex-direction: column; align-items: center; background: #fafafa; }
        canvas { border: 1px solid #ddd; background: white; border-radius: 8px; margin-bottom: 15px; width: 100%; }
        .project-item { padding: 10px; cursor: pointer; border-radius: 4px; margin-bottom: 5px; background: rgba(255,255,255,0.1); }
        .project-item:hover { background: var(--accent); }
        .active { background: var(--accent) !important; font-weight: bold; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .stat-box { background: white; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; }
        .loading { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: white; display: flex; justify-content: center; align-items: center; z-index: 100; font-weight: bold; }
    </style>
</head>
<body>

<div id="loader" class="loading">Loading RDKit Engine... Please wait...</div>

<aside class="sidebar">
    <h2>Projects</h2>
    <div id="projectButtons"></div>
</aside>

<main class="main">
    <div class="header">
        <h1 id="title" style="margin:0; font-size: 1.5rem;">Select a Project</h1>
        <div id="controls">
            <button onclick="downloadCSV()" style="padding:8px; cursor:pointer;">Download CSV</button>
        </div>
    </div>
    <div class="container">
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th onclick="sortData('id')">ID ↕</th>
                        <th onclick="sortData('energy')">Affinity ↕</th>
                        <th>MW</th>
                        <th>LogP</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <div class="viewer">
            <h3 id="molId">Compound Details</h3>
            <canvas id="molCanvas" width="350" height="350"></canvas>
            <div class="stats" id="molStats"></div>
        </div>
    </div>
</main>

<script>
    let RDKit;
    let currentData = [];
    
    // --- 50 SAMPLE HITS DATA ---
    const rawData = {
        "Screening_Project_01": [
            {id: "HIT_01", smiles: "Cc1ccccc1", energy: -9.8},
            {id: "HIT_02", smiles: "CN1C=NC2=C1C(=O)N(C(=O)N2C)C", energy: -9.5},
            {id: "HIT_03", smiles: "CC(=O)Oc1ccccc1C(=O)O", energy: -8.9},
            {id: "HIT_04", smiles: "O=C(O)c1ccccc1O", energy: -8.7},
            {id: "HIT_05", smiles: "c1ccccc1", energy: -8.5},
            {id: "HIT_06", smiles: "C1CCCCC1", energy: -8.4},
            {id: "HIT_07", smiles: "CC(C)Cc1ccc(cc1)C(C)C(=O)O", energy: -8.2},
            {id: "HIT_08", smiles: "CN(C)C(=O)Cc1ccc(cc1)OCC(=O)O", energy: -8.0},
            {id: "HIT_09", smiles: "c1ccc(cc1)C(=O)N", energy: -7.9},
            {id: "HIT_10", smiles: "CC(=O)Nc1ccc(cc1)O", energy: -7.8}
            // (Tôi rút gọn list này cho bài chat, nhưng trong file của bạn có thể paste 50 dòng tương tự)
        ]
    };

    // Tạo thêm 40 dòng giả lập nhanh chóng để đủ 50
    for(let i=11; i<=50; i++) {
        rawData["Screening_Project_01"].push({
            id: "HIT_" + i,
            smiles: "C1=CC=C(C=C1)Cl",
            energy: parseFloat((-7.0 - (i/10)).toFixed(2))
        });
    }

    window.initRDKitModule().then(instance => {
        RDKit = instance;
        document.getElementById('loader').style.display = 'none';
        initApp();
    }).catch(err => {
        document.getElementById('loader').innerText = "Failed to load RDKit. Please refresh.";
    });

    function initApp() {
        const btnBox = document.getElementById('projectButtons');
        Object.keys(rawData).forEach(pName => {
            const div = document.createElement('div');
            div.className = 'project-item';
            div.innerText = pName;
            div.onclick = () => loadProject(pName, div);
            btnBox.appendChild(div);
        });
        // Tự động load dự án đầu tiên
        if(Object.keys(rawData).length > 0) {
            btnBox.firstChild.click();
        }
    }

    function loadProject(name, el) {
        document.querySelectorAll('.project-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('title').innerText = name;

        currentData = rawData[name].map(item => {
            const mol = RDKit.get_mol(item.smiles);
            const desc = JSON.parse(mol.get_descriptors());
            mol.delete();
            return {
                ...item,
                mw: desc.amw.toFixed(1),
                logp: desc.MolLogP.toFixed(2),
                hbd: desc.NumHDonors,
                hba: desc.NumHAcceptors
            };
        });
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        currentData.forEach(hit => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${hit.id}</td><td>${hit.energy}</td><td>${hit.mw}</td><td>${hit.logp}</td>`;
            tr.onclick = () => drawMolecule(hit);
            tbody.appendChild(tr);
        });
        // Hiện phân tử đầu tiên
        if(currentData.length > 0) drawMolecule(currentData[0]);
    }

    function drawMolecule(hit) {
        document.getElementById('molId').innerText = hit.id;
        const canvas = document.getElementById('molCanvas');
        const mol = RDKit.get_mol(hit.smiles);
        mol.draw_to_canvas(canvas, 350, 350);
        mol.delete();

        document.getElementById('molStats').innerHTML = `
            <div class="stat-box"><b>MW:</b> ${hit.mw}</div>
            <div class="stat-box"><b>LogP:</b> ${hit.logp}</div>
            <div class="stat-box"><b>HBD:</b> ${hit.hbd}</div>
            <div class="stat-box"><b>HBA:</b> ${hit.hba}</div>
        `;
    }

    function sortData(key) {
        currentData.sort((a,b) => a[key] - b[key]);
        renderTable();
    }

    function downloadCSV() {
        let csv = "ID,SMILES,Energy,MW,LogP\n";
        currentData.forEach(d => { csv += `${d.id},${d.smiles},${d.energy},${d.mw},${d.logp}\n`; });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "hits_data.csv";
        a.click();
    }
</script>
</body>
</html>
