<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CADD Portfolio</title>
    <style>
        :root { --primary: #1e293b; --accent: #0ea5e9; --bg: #f8fafc; --text: #334155; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); }
        
        #sidebar { width: 260px; background: var(--primary); color: white; padding: 25px 20px; }
        .menu-item { padding: 12px; border-radius: 8px; margin-top: 10px; cursor: pointer; color: #94a3b8; }
        .menu-item.active { background: rgba(255,255,255,0.1); color: white; border-left: 4px solid var(--accent); }
        
        #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 20px 30px; background: white; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
        
        #table-area { flex: 1; overflow-y: auto; padding: 0 30px 20px 30px; background: white; }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 16px 12px; text-align: left; background: white; color: #64748b; font-size: 14px; border-bottom: 2px solid #e2e8f0; cursor: pointer; }
        /* Ép cứng độ rộng cột Structure */
        .col-struct { min-width: 250px !important; width: 250px !important; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; cursor: pointer; }
        tr:hover td { background: #f0f9ff; }
        tr.active-row td { background: #e0f2fe; }
        .thumb-img { width: 220px; height: 120px; object-fit: contain; mix-blend-mode: multiply; }
        
        #viewer { width: 420px; background: #f8fafc; padding: 30px; border-left: 1px solid #e2e8f0; overflow-y: auto; }
        .mol-card { background: white; padding: 25px; border-radius: 12px; border: 1px solid #e2e8f0; text-align: center; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="font-size: 1.1rem; color: #94a3b8; margin-top:0;">Campaigns</h2>
    <div id="menu-container"></div>
</div>

<div id="main">
    <div class="header">
        <h2 style="margin:0; font-size: 20px; color: var(--primary);">Hit list</h2>
        <div class="header-actions">
            <input type="text" id="search-input" style="padding:8px 15px; border:1px solid #cbd5e1; border-radius:6px; width:200px;" placeholder="Search ID..." onkeyup="filterTable()">
        </div>
    </div>
    <div id="table-area">
        <table id="hits-table">
            <thead><tr id="table-head-row"></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<div id="viewer">
    <div class="mol-card">
        <div style="color: #64748b; font-size: 12px; text-transform: uppercase;">Hit compound</div>
        <h3 id="mol-id" style="color: var(--primary); font-size: 24px; margin-top: 5px;">Select a Hit</h3>
        <img id="mol-image" style="width:100%; max-width:350px; margin:20px 0; display:none;">
        <div id="mol-details" style="text-align: left; font-size: 14px; color: #475569;"></div>
    </div>
</div>

<script>
    let hitsData = [], currentHeaders = [];

    fetch('data/menu.json').then(res => res.json()).then(menuItems => {
        const container = document.getElementById('menu-container');
        const proj = new URLSearchParams(window.location.search).get('project') || 'hitlist_1';
        menuItems.forEach(item => {
            const div = document.createElement('div');
            div.className = 'menu-item' + (item.id === proj ? ' active' : '');
            div.innerText = item.name;
            div.onclick = () => window.location.href = '?project=' + item.id;
            container.appendChild(div);
        });
    });

    fetch(`data/${new URLSearchParams(window.location.search).get('project') || 'hitlist_1'}.json`).then(res => res.json()).then(data => {
        hitsData = data;
        currentHeaders = Object.keys(data[0]).filter(k => !['mol_image', 'id', 'smiles'].includes(k.toLowerCase()));
        renderHeaders(); renderTableBody(hitsData);
    });

    function renderHeaders() {
        const row = document.getElementById('table-head-row');
        row.innerHTML = '<th>ID</th><th class="col-struct">Structure</th>';
        currentHeaders.forEach(h => row.innerHTML += `<th>${h}</th>`);
    }

    function renderTableBody(data) {
        const body = document.getElementById('table-body');
        body.innerHTML = '';
        data.forEach((hit, index) => {
            const tr = document.createElement('tr');
            tr.onclick = () => renderMolecule(hit, tr);
            let id = hit.id || hit.ID || `HIT_${index+1}`;
            let html = `<td><b>${id}</b></td><td class="col-struct">${hit.mol_image ? `<img src="${hit.mol_image}" class="thumb-img">` : '-'}</td>`;
            currentHeaders.forEach(h => html += `<td>${parseFloat(hit[h]) ? parseFloat(hit[h]).toFixed(3) : hit[h]}</td>`);
            tr.innerHTML = html;
            body.appendChild(tr);
        });
    }

    function filterTable() {
        const q = document.getElementById('search-input').value.toLowerCase();
        renderTableBody(hitsData.filter(h => JSON.stringify(h).toLowerCase().includes(q)));
    }

    function renderMolecule(hit, tr) {
        document.querySelectorAll('tr').forEach(r => r.classList.remove('active-row'));
        tr.classList.add('active-row');
        document.getElementById('mol-id').innerText = hit.id || hit.ID || 'Hit';
        const img = document.getElementById('mol-image');
        img.src = hit.mol_image || ''; img.style.display = hit.mol_image ? 'block' : 'none';
        let det = '<hr style="border:0; border-top:1px solid #e2e8f0; margin:15px 0;">';
        currentHeaders.forEach(h => det += `<div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span><b>${h}:</b></span><span>${hit[h]}</span></div>`);
        document.getElementById('mol-details').innerHTML = det;
    }

    function exportCSV() {
        let csv = ['ID', ...currentHeaders, 'SMILES'].join(',') + '\n' + hitsData.map(h => [h.id, ...currentHeaders.map(c => h[c]), h.smiles].join(',')).join('\n');
        const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
        a.download = 'export.csv'; a.click();
    }
</script>
</body>
</html>
