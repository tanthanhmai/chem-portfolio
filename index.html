<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional Virtual Screening Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@rdkit/rdkit/dist/RDKit_minimal.js"></script>
    <style>
        :root { --primary: #1e293b; --accent: #3b82f6; --bg: #f8fafc; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: #334155; }
        #loader { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; font-weight: bold; color: var(--accent); flex-direction: column; }
        #loader span { font-size: 0.9rem; color: #64748b; margin-top: 10px; font-weight: normal; }
        #sidebar { width: 260px; background: var(--primary); color: white; padding: 20px; }
        #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 20px 30px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; background: white; }
        #table-area { flex: 1; overflow-y: auto; padding: 20px; background: white; border-right: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #f1f5f9; padding: 12px; text-align: left; position: sticky; top: 0; color: #64748b; text-transform: uppercase; font-size: 12px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
        tr:hover { background: #eff6ff; }
        #viewer { width: 420px; background: #f8fafc; padding: 25px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }
        .mol-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; text-align: center; }
        canvas { width: 100%; height: auto; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 15px; }
        .btn-export { background: #10b981; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<div id="loader">
    <div id="loader-text">⚙️ Tải động cơ RDKit (jsDelivr)...</div>
    <span id="loader-sub">Đang kéo file WASM (2MB) - Vui lòng đợi</span>
</div>

<div id="sidebar">
    <h2 style="font-size: 1.2rem; border-bottom: 1px solid #334155; padding-bottom: 10px; margin-top:0;">DASHBOARD</h2>
    <div style="padding:10px; background:rgba(255,255,255,0.1); border-radius:6px; margin-top: 15px;">Dự án Demo</div>
</div>

<div id="main">
    <div class="header">
        <h2 style="margin:0; font-size: 1.4rem;">Top Binding Hits</h2>
        <button class="btn-export">Download CSV</button>
    </div>
    <div id="table-area">
        <table>
            <thead>
                <tr>
                    <th>Compound ID</th>
                    <th>Affinity</th>
                    <th>MW</th>
                    <th>LogP</th>
                </tr>
            </thead>
            <tbody id="hits-table"></tbody>
        </table>
    </div>
</div>

<div id="viewer">
    <div class="mol-card">
        <h3 id="mol-id" style="margin-top:0; color:var(--primary);">Chọn Phân tử</h3>
        <canvas id="mol-canvas" width="350" height="350"></canvas>
        <div id="mol-details" style="text-align: left; font-size: 14px; color: #475569; line-height: 1.6;"></div>
    </div>
</div>

<script>
    let RDKitModule;
    const hits = [
        { id: "HIT_001", smiles: "c1ccccc1", energy: -9.2 },
        { id: "HIT_002", smiles: "CN1C=NC2=C1C(=O)N(C(=O)N2C)C", energy: -8.8 },
        { id: "HIT_003", smiles: "CC(=O)Oc1ccccc1C(=O)O", energy: -8.5 },
        { id: "HIT_004", smiles: "C1CN(CCN1)Cc2ccc(cc2)C(=O)O", energy: -7.9 },
        { id: "HIT_005", smiles: "O=C(O)c1ccccc1O", energy: -7.4 }
    ];

    // Cài đặt hẹn giờ 10 giây
    const timeoutHandle = setTimeout(() => {
        const loaderText = document.getElementById('loader-text');
        if(loaderText) {
            loaderText.innerHTML = "❌ RDKit bị treo!";
            document.getElementById('loader-sub').innerHTML = "Nguyên nhân: Mạng của bạn chặn file .wasm hoặc CDN quá tải. Hãy thử phát Wi-Fi từ điện thoại (4G) sang máy tính để kiểm tra.";
            document.getElementById('loader').style.color = "red";
        }
    }, 10000);

    // Khởi tạo RDKit
    window.initRDKitModule().then(function(instance) {
        clearTimeout(timeoutHandle); // Tắt hẹn giờ nếu thành công
        RDKitModule = instance;
        document.getElementById('loader').style.display = 'none';
        renderTable();
    }).catch(function(err) {
        clearTimeout(timeoutHandle);
        document.getElementById('loader-text').innerHTML = "❌ Lỗi khởi tạo RDKit!";
        document.getElementById('loader-sub').innerHTML = err.toString();
        document.getElementById('loader').style.color = "red";
    });

    function renderTable() {
        const tbody = document.getElementById('hits-table');
        hits.forEach(hit => {
            const mol = RDKitModule.get_mol(hit.smiles);
            const desc = JSON.parse(mol.get_descriptors());
            const tr = document.createElement('tr');
            tr.innerHTML = `<td><b>${hit.id}</b></td><td style="color:#ef4444; font-weight:bold;">${hit.energy}</td><td>${desc.amw.toFixed(1)}</td><td>${desc.MolLogP.toFixed(2)}</td>`;
            tr.onclick = () => showMol(hit, desc);
            tbody.appendChild(tr);
            mol.delete();
        });
        showMol(hits[0], JSON.parse(RDKitModule.get_mol(hits[0].smiles).get_descriptors()));
    }

    function showMol(hit, desc) {
        document.getElementById('mol-id').innerText = hit.id;
        const canvas = document.getElementById('mol-canvas');
        const mol = RDKitModule.get_mol(hit.smiles);
        
        // RDKit chuẩn bài báo
        mol.draw_to_canvas_with_highlights(canvas, JSON.stringify({ width: 350, height: 350, bondLineWidth: 2.0, multipleBondOffset: 0.2 }));
        mol.delete();

        document.getElementById('mol-details').innerHTML = `
            <hr style="border:0; border-top:1px dashed #cbd5e1; margin:15px 0;">
            <div><b>Affinity:</b> ${hit.energy} kcal/mol</div>
            <div style="margin-top:5px;"><b>MW:</b> ${desc.amw.toFixed(2)} | <b>LogP:</b> ${desc.MolLogP.toFixed(2)}</div>
            <div style="margin-top:5px; font-size: 11px; color:#94a3b8; word-break:break-all;"><b>SMILES:</b> ${hit.smiles}</div>
        `;
    }
</script>

</body>
</html>
