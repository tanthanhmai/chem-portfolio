<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CADD Portfolio</title>
    <style>
        :root { --primary: #1e293b; --accent: #0ea5e9; --bg: #f8fafc; --text: #334155; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); }
        
        #sidebar { width: 260px; background: var(--primary); color: white; padding: 25px 20px; z-index: 10; display: flex; flex-direction: column; }
        .menu-item { padding: 12px; border-radius: 8px; margin-top: 10px; cursor: pointer; transition: 0.2s; color: #94a3b8; }
        .menu-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .menu-item.active { background: rgba(255,255,255,0.1); font-weight: 600; color: white; border-left: 4px solid var(--accent); }
        
        #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 20px 30px; background: white; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
        .header-actions { display: flex; gap: 15px; }
        .search-bar { padding: 8px 15px; border: 1px solid #cbd5e1; border-radius: 6px; width: 220px; }
        .btn-export { background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: 500; }
        
        #table-area { flex: 1; overflow-y: auto; padding: 0 30px 20px 30px; background: white; }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 16px 12px; text-align: left; position: sticky; top: 0; color: #64748b; font-size: 13px; border-bottom: 2px solid #e2e8f0; cursor: pointer; background: white; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; cursor: pointer; vertical-align: middle; }
        tr:hover td { background: #f0f9ff; }
        tr.active-row td { background: #e0f2fe; }
        
        .thumb-img { width: 120px; height: 80px; object-fit: contain; mix-blend-mode: multiply; }
        #viewer { width: 420px; background: #f8fafc; padding: 30px; border-left: 1px solid #e2e8f0; overflow-y: auto; }
        .mol-card { background: white; padding: 25px; border-radius: 12px; border: 1px solid #e2e8f0; text-align: center; }
        .mol-img { width: 100%; max-width: 350px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="font-size: 1.1rem; color: #94a3b8; margin-top:0;">Campaigns</h2>
    <div id="menu-container"></div>
</div>

<div id="main">
    <div class="header">
        <h2 style="margin:0; font-size: 1.5rem; color: var(--primary);">Hit list</h2>
        <div class="header-actions">
            <input type="text" id="search-input" class="search-bar" placeholder="Search ID or SMILES..." onkeyup="filterTable()">
            <button class="btn-export" onclick="exportCSV()">Export CSV</button>
        </div>
    </div>
    <div id="table-area">
        <table id="hits-table">
            <thead><tr id="table-head-row"></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<div id="viewer">
    <div class="mol-card">
        <h3 id="mol-id" style="color:var(--primary);">Select a Hit</h3>
        <img id="mol-image" class="mol-img" src="" alt="Structure" style="display:none;">
        <div id="mol-details" style="text-align: left; font-size: 14px; color: #475569;"></div>
    </div>
</div>

<script>
    let hitsData = [], currentHeaders = [], sortCol = null, sortAsc = true;
    const urlParams = new URLSearchParams(window.location.search);
    const currentProject = urlParams.get('project') || 'hitlist_1'; 

    function formatNumber(val) {
        if (val === null || val === undefined || val === '') return '-';
        if (!isNaN(val) && val.toString().indexOf('.') !== -1) return parseFloat(val).toFixed(3);
        return val;
    }

    fetch('data/menu.json').then(res => res.json()).then(menuItems => {
        const container = document.getElementById('menu-container');
        menuItems.forEach(item => {
            const div = document.createElement('div');
            div.className = 'menu-item' + (item.id === currentProject ? ' active' : '');
            div.innerText = item.name;
            div.onclick = () => window.location.href = '?project=' + item.id;
            container.appendChild(div);
        });
    });

    fetch(`data/${currentProject}.json`).then(res => res.json()).then(data => {
        hitsData = data;
        const excludeCols = ['mol_image', 'id', 'smiles'];
        currentHeaders = Object.keys(data[0]).filter(k => !excludeCols.includes(k.toLowerCase()));
        renderHeaders();
        renderTableBody(hitsData);
    });

    function renderHeaders() {
        const row = document.getElementById('table-head-row');
        row.innerHTML = '<th>ID ' + (sortCol==='id' ? (sortAsc?'▲':'▼') : '↕') + '</th><th>Structure</th>';
        currentHeaders.forEach(h => {
            const th = document.createElement('th');
            th.innerText = h + (sortCol===h ? (sortAsc?' ▲':' ▼') : ' ↕');
            th.onclick = () => sortTable(h);
            row.appendChild(th);
        });
    }

    function renderTableBody(data) {
        const body = document.getElementById('table-body');
        body.innerHTML = '';
        data.forEach((hit, index) => {
            const tr = document.createElement('tr');
            tr.onclick = () => renderMolecule(hit, tr);
            let id = hit.id || hit.ID || `HIT_${index+1}`;
            let html = `<td><b>${id}</b></td><td>${hit.mol_image ? `<img src="${hit.mol_image}" class="thumb-img">` : '-'}</td>`;
            currentHeaders.forEach(h => html += `<td>${formatNumber(hit[h])}</td>`);
            tr.innerHTML = html;
            body.appendChild(tr);
        });
        if(data.length > 0) renderMolecule(data[0], body.firstChild);
    }

    function sortTable(header) {
        sortAsc = (sortCol === header) ? !sortAsc : true;
        sortCol = header;
        hitsData.sort((a,b) => {
            let valA = a[header] || '', valB = b[header] || '';
            return sortAsc ? (valA > valB ? 1 : -1) : (valA < valB ? 1 : -1);
        });
        renderHeaders(); renderTableBody(hitsData);
    }

    function filterTable() {
        const q = document.getElementById('search-input').value.toLowerCase();
        renderTableBody(hitsData.filter(h => (h.id||'').toString().toLowerCase().includes(q)));
    }

    function renderMolecule(hit, tr) {
        document.querySelectorAll('tr').forEach(r => r.classList.remove('active-row'));
        tr.classList.add('active-row');
        document.getElementById('mol-id').innerText = hit.id || hit.ID || 'Hit';
        const img = document.getElementById('mol-image');
        img.src = hit.mol_image || ''; img.style.display = hit.mol_image ? 'block' : 'none';
        
        let det = '<hr style="border:0; border-top:1px solid #e2e8f0; margin:15px 0;">';
        currentHeaders.forEach(h => det += `<div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span><b>${h}:</b></span><span>${formatNumber(hit[h])}</span></div>`);
        det += `<div style="margin-top:15px;"><b>SMILES:</b><div style="background:#f1f5f9; padding:8px; border-radius:4px; font-size:11px; word-break:break-all;">${hit.smiles||hit.SMILES||''}</div></div>`;
        document.getElementById('mol-details').innerHTML = det;
    }

    function exportCSV() {
        let csv = ['ID', ...currentHeaders, 'SMILES'].join(',') + '\n' + hitsData.map(h => [h.id, ...currentHeaders.map(c => h[c]), h.smiles].join(',')).join('\n');
        const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
        a.download = `${currentProject}_export.csv`; a.click();
    }
</script>
</body>
</html>
