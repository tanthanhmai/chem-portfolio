<script>
    let hitsData = [];
    
    // Đọc URL để xem đang ở dự án nào
    const urlParams = new URLSearchParams(window.location.search);
    const currentProject = urlParams.get('project') || 'hitlist_1'; 

    // 1. TẢI MENU TỪ FILE menu.json
    fetch('data/menu.json')
        .then(res => {
            if(!res.ok) throw new Error("Chưa có file menu.json");
            return res.json();
        })
        .then(menuItems => {
            const sidebar = document.getElementById('sidebar');
            // Giữ lại tiêu đề Campaigns
            sidebar.innerHTML = '<h2 style="margin-top:0; color:#94a3b8; font-size:1.1rem; text-transform:uppercase;">Campaigns</h2>';
            
            // Vẽ các tab dự án
            menuItems.forEach(item => {
                const isActive = item.id === currentProject;
                const tabStyle = isActive 
                    ? "padding:12px; background:rgba(255,255,255,0.1); border-radius:8px; margin-top:10px; font-weight:600; border-left:4px solid var(--accent); cursor:pointer;"
                    : "padding:12px; border-radius:8px; margin-top:10px; color:#94a3b8; cursor:pointer; transition:0.2s;";
                
                const div = document.createElement('div');
                div.style.cssText = tabStyle;
                div.innerHTML = (isActive ? "🎯 " : "📁 ") + item.name;
                
                // Khi click vào tab, tự động tải lại trang với link dự án mới
                div.onclick = () => { window.location.href = `?project=${item.id}`; };
                
                // Hiệu ứng hover cho các tab không active
                if(!isActive) {
                    div.onmouseover = () => { div.style.background = "rgba(255,255,255,0.05)"; div.style.color = "white"; };
                    div.onmouseout = () => { div.style.background = "transparent"; div.style.color = "#94a3b8"; };
                }
                
                sidebar.appendChild(div);
            });
        })
        .catch(err => {
            console.log(err);
            // Backup: Nếu chưa tạo menu.json, vẫn hiển thị nhãn mặc định
            document.getElementById('project-label').innerText = "🎯 " + currentProject.toUpperCase();
        });

    // 2. TẢI DỮ LIỆU CỦA DỰ ÁN HIỆN TẠI
    fetch(`data/${currentProject}.json`)
        .then(res => {
            if (!res.ok) throw new Error('File not found');
            return res.json();
        })
        .then(data => {
            hitsData = data;
            initDynamicTable();
        })
        .catch(err => {
            document.getElementById('error-msg').style.display = 'block';
            document.getElementById('table-area').style.display = 'none';
        });

    // 3. KHỞI TẠO BẢNG DỮ LIỆU ĐỘNG (Giữ nguyên như cũ)
    function initDynamicTable() {
        if(hitsData.length === 0) return;
        
        const excludeCols = ['mol_image', 'id', 'smiles'];
        const headers = ['Compound ID']; 
        
        const firstRow = hitsData[0];
        for(let key in firstRow) {
            if(!excludeCols.includes(key)) headers.push(key);
        }

        const theadRow = document.getElementById('table-head-row');
        headers.forEach(h => {
            const th = document.createElement('th');
            th.innerText = h;
            theadRow.appendChild(th);
        });

        const tbody = document.getElementById('table-body');
        hitsData.forEach((hit, index) => {
            const tr = document.createElement('tr');
            tr.id = `row-${index}`;
            
            const displayId = hit.id || hit.ID || `HIT_${index+1}`;
            let rowHtml = `<td><span class="badge">${displayId}</span></td>`;
            
            headers.slice(1).forEach(key => {
                const val = hit[key] !== null && hit[key] !== undefined ? hit[key] : '-';
                if(key.toLowerCase().includes('energy') || key.toLowerCase().includes('score')) {
                    rowHtml += `<td style="color:#0369a1; font-weight:700;">${val}</td>`;
                } else {
                    rowHtml += `<td>${val}</td>`;
                }
            });

            tr.innerHTML = rowHtml;
            tr.onclick = () => renderMolecule(hit, tr, displayId, headers);
            tbody.appendChild(tr);
        });

        const firstId = hitsData[0].id || hitsData[0].ID || 'HIT_1';
        renderMolecule(hitsData[0], document.getElementById('row-0'), firstId, headers);
    }

    // 4. HIỂN THỊ CHI TIẾT & ẢNH RDKIT (Giữ nguyên như cũ)
    function renderMolecule(hit, rowElement, displayId, headers) {
        document.querySelectorAll('tr').forEach(r => r.classList.remove('active-row'));
        if(rowElement) rowElement.classList.add('active-row');

        document.getElementById('mol-id').innerText = displayId;
        
        const imgEl = document.getElementById('mol-image');
        if(hit.mol_image) {
            imgEl.src = hit.mol_image;
            imgEl.style.display = 'block';
        } else {
            imgEl.style.display = 'none';
        }
        
        let detailsHtml = '<hr style="border:0; border-top:1px dashed #cbd5e1; margin:15px 0;">';
        headers.slice(1).forEach(key => {
            const val = hit[key] !== null && hit[key] !== undefined ? hit[key] : '-';
            detailsHtml += `<div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                                <span style="text-transform:capitalize;"><b>${key}:</b></span>
                                <span>${val}</span>
                            </div>`;
        });

        const smilesVal = hit.smiles || hit.SMILES || '';
        if(smilesVal) {
            detailsHtml += `<div style="margin-top:15px;"><b style="font-size:12px; color:#94a3b8;">SMILES:</b>
                            <div style="background:#f1f5f9; padding:8px; border-radius:6px; margin-top:5px; font-family:monospace; font-size:11px; word-break:break-all;">
                                ${smilesVal}
                            </div></div>`;
        }

        document.getElementById('mol-details').innerHTML = detailsHtml;
    }
</script>
