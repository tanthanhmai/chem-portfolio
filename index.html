<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Medicinal Chemistry Hits Hub</title>
    <script src="https://unpkg.com/smiles-drawer@2.0.1/dist/smiles-drawer.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; height: 100vh; margin: 0; background: #f4f7f6; }
        #sidebar { width: 220px; background: #2c3e50; color: white; padding: 20px; }
        #main { flex: 1; display: flex; flex-direction: column; background: white; overflow: hidden; }
        #table-area { flex: 1; overflow-y: auto; padding: 20px; }
        #viewer { width: 380px; background: #fff; border-left: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; align-items: center; box-shadow: -2px 0 5px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #eee; padding: 10px; text-align: left; position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
        tr:hover { background: #f1f9ff; }
        canvas { background: white; border: 1px solid #eee; border-radius: 8px; width: 300px; height: 300px; }
        .btn-dl { background: #27ae60; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>🧪 Projects</h3>
    <div style="padding:10px; background:rgba(255,255,255,0.1); border-radius:4px;">Virtual Screening 01</div>
</div>

<div id="main">
    <div style="padding:15px 20px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center;">
        <h2 style="margin:0">Hit List Dashboard</h2>
        <button class="btn-dl" onclick="downloadCSV()">Download CSV</button>
    </div>
    <div id="table-area">
        <table>
            <thead>
                <tr>
                    <th>Compound ID</th>
                    <th>Affinity (kcal/mol)</th>
                    <th>SMILES</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
</div>

<div id="viewer">
    <h3 id="mol-id">Select a Compound</h3>
    <canvas id="output-canvas" width="300" height="300"></canvas>
    <div id="info" style="margin-top:20px; width:100%; font-size: 14px; line-height: 1.6;"></div>
</div>

<script>
    // 50 Dữ liệu mẫu (Cấu trúc Smiles thật)
    const hits = [];
    const smilesSamples = ["Cc1ccccc1", "CN1C=NC2=C1C(=O)N(C(=O)N2C)C", "CC(=O)Oc1ccccc1C(=O)O", "c1ccccc1O", "O=C(O)c1ccccc1"];
    for(let i=1; i<=50; i++) {
        hits.push({
            id: "HIT_" + String(i).padStart(3, '0'),
            smiles: smilesSamples[i % 5],
            energy: (-8.0 - (i * 0.04)).toFixed(2)
        });
    }

    // Khởi tạo trình vẽ
    let smilesDrawer = new SmilesDrawer.Drawer({ width: 300, height: 300 });

    function init() {
        const tbody = document.getElementById('tbody');
        hits.forEach(hit => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td><b>${hit.id}</b></td><td>${hit.energy}</td><td style="color:#666; font-family:monospace; font-size:11px;">${hit.smiles}</td>`;
            tr.onclick = () => viewHit(hit);
            tbody.appendChild(tr);
        });
        // Xem mặc định cái đầu tiên
        viewHit(hits[0]);
    }

    function viewHit(hit) {
        document.getElementById('mol-id').innerText = hit.id;
        document.getElementById('info').innerHTML = `
            <p><b>Affinity:</b> ${hit.energy} kcal/mol</p>
            <p><b>SMILES:</b> <span style="word-break: break-all; color: #666;">${hit.smiles}</span></p>
        `;
        
        // Vẽ cấu trúc
        SmilesDrawer.parse(hit.smiles, function(tree) {
            smilesDrawer.draw(tree, "output-canvas", "light", false);
        });
    }

    function downloadCSV() {
        let csv = "ID,Affinity,SMILES\n";
        hits.forEach(h => { csv += `${h.id},${h.energy},${h.smiles}\n`; });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "Virtual_Screening_Hits.csv";
        a.click();
    }

    // Chạy khi trang web tải xong
    window.onload = init;
</script>

</body>
</html>
