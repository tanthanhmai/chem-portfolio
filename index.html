<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional Chemistry Portfolio</title>
    <script src="https://unpkg.com/@rdkit/rdkit/dist/RDKit_minimal.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; height: 100vh; background: #f8fafc; }
        #sidebar { width: 260px; background: var(--primary); color: white; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        #main { flex: 1; display: flex; flex-direction: column; background: white; }
        .header { padding: 20px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        #table-area { flex: 1; overflow-y: auto; padding: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #f1f5f9; padding: 12px; text-align: left; position: sticky; top: 0; color: #64748b; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
        tr:hover { background: #eff6ff; }
        #viewer { width: 420px; background: #fcfcfc; border-left: 1px solid #e2e8f0; padding: 30px; display: flex; flex-direction: column; align-items: center; }
        .mol-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; text-align: center; }
        canvas { width: 100%; height: auto; border-radius: 8px; margin-bottom: 20px; }
        .badge { background: #eef2ff; color: #4f46e5; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        #loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:white; display:flex; justify-content:center; align-items:center; z-index:9999; font-weight:bold; color: var(--primary); }
    </style>
</head>
<body>

<div id="loading-overlay">⚙️ Loading RDKit Scientific Engine...</div>

<aside id="sidebar">
    <h2 style="font-size: 1.2rem; border-bottom: 1px solid #3e4f5f; padding-bottom: 10px;">PROJECTS</h2>
    <div style="padding:10px; background:rgba(255,255,255,0.1); border-radius:6px; cursor:pointer;">Virtual Screening Alpha</div>
</aside>

<main id="main">
    <div class="header">
        <h2 style="margin:0; color: var(--primary);">Hits Dashboard</h2>
        <button onclick="exportCSV()" style="padding:8px 16px; background:var(--accent); color:white; border:none; border-radius:6px; cursor:pointer; font-weight:600;">Export CSV</button>
    </div>
    <div id="table-area">
        <table>
            <thead>
                <tr>
                    <th>Compound ID</th>
                    <th>Affinity (kcal/mol)</th>
                    <th>MW</th>
                    <th>LogP</th>
                </tr>
            </thead>
            <tbody id="hits-table"></tbody>
        </table>
    </div>
</main>

<aside id="viewer">
    <div class="mol-card">
        <h3 id="mol-id" style="margin-top:0;">Select a Molecule</h3>
        <canvas id="mol-canvas" width="400" height="400"></canvas>
        <div id="mol-details" style="text-align: left; font-size: 14px; color: #444;"></div>
    </div>
</aside>

<script>
    let RDKitModule;
    const hits = [];
    const smiles = ["Cc1ccccc1", "CN1C=NC2=C1C(=O)N(C(=O)N2C)C", "CC(=O)Oc1ccccc1C(=O)O", "c1ccccc1O", "O=C(O)c1ccccc1"];
    
    // Tạo 50 hits mẫu
    for(let i=1; i<=50; i++) {
        hits.push({
            id: "HIT-" + String(i).padStart(3, '0'),
            smiles: smiles[i % 5],
            energy: (-8.0 - (Math.random() * 3)).toFixed(2)
        });
    }

    // KHỞI TẠO RDKIT
    window.initRDKitModule().then(function(instance) {
        RDKitModule = instance;
        console.log("RDKit version: " + RDKitModule.version());
        document.getElementById('loading-overlay').style.display = 'none';
        renderApp();
    }).catch(err => {
        document.getElementById('loading-overlay').innerHTML = "❌ Failed to load RDKit engine. Please use Chrome/Edge.";
        console.error(err);
    });

    function renderApp() {
        const tbody = document.getElementById('hits-table');
        hits.forEach(hit => {
            const mol = RDKitModule.get_mol(hit.smiles);
            const descriptors = JSON.parse(mol.get_descriptors());
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><span class="badge">${hit.id}</span></td>
                <td><b>${hit.energy}</b></td>
                <td>${descriptors.amw.toFixed(1)}</td>
                <td>${descriptors.MolLogP.toFixed(2)}</td>
            `;
            tr.onclick = () => showMolecule(hit, descriptors);
            tbody.appendChild(tr);
            mol.delete();
        });
        // Hiển thị cái đầu tiên
        showMolecule(hits[0], JSON.parse(RDKitModule.get_mol(hits[0].smiles).get_descriptors()));
    }

    function showMolecule(hit, desc) {
        document.getElementById('mol-id').innerText = hit.id;
        const canvas = document.getElementById('mol-canvas');
        const mol = RDKitModule.get_mol(hit.smiles);
        
        // Cấu hình vẽ chuyên nghiệp của RDKit
        const drawingDetails = {
            width: 400,
            height: 400,
            bondLineWidth: 2, // Làm nét vẽ đậm hơn
            addStereoAnnotation: true,
            isSubstructureHighlight: true
        };
        
        mol.draw_to_canvas_with_highlights(canvas, JSON.stringify(drawingDetails));
        mol.delete();

        document.getElementById('mol-details').innerHTML = `
            <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
            <p><b>Affinity:</b> ${hit.energy} kcal/mol</p>
            <p><b>MW:</b> ${desc.amw.toFixed(2)} | <b>LogP:</b> ${desc.MolLogP.toFixed(2)}</p>
            <p><b>HBD/HBA:</b> ${desc.NumHDonors}/${desc.NumHAcceptors}</p>
        `;
    }

    function exportCSV() {
        let csv = "ID,SMILES,Energy\n";
        hits.forEach(h => csv += `${h.id},${h.smiles},${h.energy}\n`);
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = "Virtual_Screening_Results.csv"; a.click();
    }
</script>

</body>
</html>
